<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive GSMCI Footer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <style>
      /* Base Styling */
      :root {
        --footer-bg-color: #000;
        --footer-text-color: #fff;
        --footer-link-color: #ccc;
        --footer-link-hover-color: #fff;
        --footer-gap: 20px;
      }

      .site-footer {
        background-color: var(--footer-bg-color);
        color: var(--footer-text-color);
        font-family: Arial, sans-serif;
        padding: 40px var(--footer-gap);
        line-height: 1.5;
        box-shadow: 0px -1.5px 20px 5px #6c757d;
      }

      .footer-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--footer-gap);
        max-width: 1400px;
        margin: 0 auto;
        text-align: center;
      }

      .footer-section h2 {
        font-size: 1.25rem;
        font-weight: bold;
        color: var(--footer-text-color);
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .footer-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .footer-section ul li {
        margin-bottom: 8px;
      }

      .footer-section ul li a {
        color: var(--footer-link-color);
        text-decoration: none;
        font-size: 0.875rem;
        transition: color 0.3s ease;
      }

      .footer-section ul li a:hover {
        color: var(--footer-link-hover-color);
      }

      /* Social Links */
      .social-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
      }

      .social-links li a {
        font-size: 1.5rem;
        color: var(--footer-link-color);
        transition: color 0.3s ease;
      }

      .social-links li a:hover {
        color: var(--footer-link-hover-color);
      }

      /* Branding Section */
      .footer-branding {
        text-align: center;
        margin-top: 30px;
      }

      .footer-branding img {
        max-width: 150px;
        height: auto;
      }

      .footer-branding h1 {
        font-size: 1.5rem;
        margin-top: 10px;
        font-weight: 600;
      }

      .footer-branding p {
        font-size: 1rem;
        color: var(--footer-link-color);
        margin-top: 10px;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .footer-container {
          grid-template-columns: 1fr;
          gap: 15px;
        }

        .footer-section h2 {
          font-size: 1.125rem;
        }

        .footer-section ul li a {
          font-size: 0.875rem;
        }

        .footer-branding img {
          max-width: 120px;
        }

        .footer-branding h1 {
          font-size: 1.25rem;
        }
      }

      @media (max-width: 480px) {
        .footer-container {
          grid-template-columns: 1fr;
        }

        .site-footer {
          padding: 20px;
        }

        .footer-section h2 {
          font-size: 1rem;
        }

        .footer-section ul li a {
          font-size: 0.75rem;
        }

        .footer-branding img {
          max-width: 100px;
        }

        .footer-branding h1 {
          font-size: 1rem;
        }

        .footer-branding p {
          font-size: 0.75rem;
        }
      }

      @media (min-width: 1921px) {
        .footer-container {
          grid-template-columns: repeat(
            4,
            1fr
          ); /* 4 columns on ultra-large screens */
          gap: 40px;
        }

        .site-footer {
          padding: 60px 80px;
        }

        .footer-section h2 {
          font-size: 1.75rem;
        }

        .footer-section ul li a {
          font-size: 1.125rem;
        }

        .social-links li a {
          font-size: 2rem;
        }

        .footer-branding img {
          max-width: 200px;
        }

        .footer-branding h1 {
          font-size: 2rem;
        }

        .footer-branding p {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <footer class="site-footer">
      <div class="footer-container">
        <div class="footer-section">
          <h2>Resources</h2>
          <ul>
            <li>
              <a
                href="directory-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Find A Doctor</a
              >
            </li>
            <li>
              <a
                href="career-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Explore Careers</a
              >
            </li>
          </ul>
        </div>
        <div class="footer-section">
          <h2>Services</h2>
          <ul>
            <li>
              <a
                href="services-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Our Services</a
              >
            </li>
          </ul>
        </div>
        <div class="footer-section">
          <h2>Get In Touch</h2>
          <ul>
            <li><a href="contact-us-main.html">Contact Us</a></li>
            <li>
              <a href="https://maps.app.goo.gl/JsdiwSiXZEiLDsHv6"
                >Maps & Directions</a
              >
            </li>
            <li>
              <a
                href="career-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Jobs</a
              >
            </li>
          </ul>
        </div>
        <div class="footer-section">
          <h2>Follow Us</h2>
          <ul class="social-links">
            <li>
              <a href="#" aria-label="Instagram"
                ><i class="fab fa-instagram"></i
              ></a>
            </li>
            <li>
              <a
                href="https://www.facebook.com/gsmciguimaras"
                aria-label="Facebook"
                ><i class="fab fa-facebook"></i
              ></a>
            </li>
            <li>
              <a href="#" aria-label="YouTube"
                ><i class="fab fa-youtube"></i
              ></a>
            </li>
          </ul>
        </div>
      </div>
      <div class="footer-branding">
        <a href="https://gsmci.com/" aria-label="GSMCI Website">
          <img src="GSMCI-Pictures/Logos/GSMCI Logo low.png" alt="GSMCI Logo" />
        </a>
        <h1>Guimaras Specialist Medical Center Inc.</h1>
        <p>© 2025 GSMCI-IT Website Developer</p>
      </div>
    </footer>
  </body>
</html>
