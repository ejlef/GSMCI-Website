<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSMCI Footer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <style>
      /* Base Styling */
      .site-footer {
        background-color: #000000;
        color: #fff;
        font-family: Arial, sans-serif;
        padding: 50px 20px;
        line-height: 1.5;
        box-shadow: 0px -1.5px 20px 5px #6c757d;
      }

      .footer-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center; /* Center horizontally */
        max-width: 1200px;
        margin: 0 auto;
        gap: 20px;
        text-align: center; /* Center text */
      }

      .footer-section {
        flex: 1;
        min-width: 200px;
        margin-bottom: 20px;
      }

      .footer-section h2 {
        font-size: 1.125rem;
        font-weight: bold;
        color: #fff;
        margin-bottom: 10px;
        text-transform: uppercase;
        font-family: "AppleGaramond-Bold";
      }

      .footer-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .footer-section ul li {
        margin-bottom: 8px;
      }

      .footer-section ul li a {
        color: #ccc;
        text-decoration: none;
        font-size: 0.875rem;
        font-family: "Roboto", sans-serif;
        font-weight: 400;
      }

      .footer-section ul li a:hover {
        color: #fff;
        text-decoration: underline;
      }

      /* Social Links */
      .social-links {
        display: flex;
        justify-content: center; /* Center horizontally */
        gap: 20px;
        margin-top: 15px;
      }

      .social-links li a img {
        width: 24px;
        height: 24px;
        transition: opacity 0.3s ease;
      }

      .social-links li a:hover img {
        opacity: 0.7;
      }

      /* Branding Section */
      .footer-branding {
        text-align: center; /* Center text */
        margin-top: 30px;
        width: 100%; /* Full width */
        display: flex;
        flex-direction: column; /* Stack items */
        align-items: center; /* Center items */
      }

      .footer-branding img {
        max-width: 160px;
        height: auto;
      }

      .footer-branding h1 {
        font-size: 1.25rem;
        color: #fff;
        margin-top: 10px;
        font-weight: 600;
      }

      .footer-branding p {
        font-size: 0.75rem;
        color: #ccc;
        margin-top: 10px;
      }

      /* Large Devices */
      @media (min-width: 769px) {
        .footer-section {
          flex: 1;
        }
      }

      @media (max-width: 426px) {
        .footer-container {
          flex-direction: column;
          text-align: center;
        }

        .footer-section {
          width: 100%;
          margin-bottom: 20px;
        }

        .social-links {
          justify-content: center;
        }

        .footer-branding {
          margin-top: 20px;
        }

        .site-footer {
          padding: 20px;
        }

        .footer-section h2 {
          font-size: 1.1rem;
        }

        .footer-section ul li a {
          font-size: 0.875rem;
        }

        .footer-branding h1 {
          font-size: 1.125rem;
        }

        .footer-branding p {
          font-size: 0.75rem;
        }

        .social-links li a img {
          width: 18px;
          height: 18px;
        }

        .footer-branding img {
          max-width: 120px;
        }
      }
    </style>
  </head>

  <body>
    <footer class="site-footer">
      <div class="footer-container">
        <!-- Security & Brand Section -->
        <div class="footer-section">
          <h2>Resources</h2>
          <ul>
            <li>
              <a
                href="directory-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Find A Doctors</a
              >
            </li>
            <li>
              <a
                href="career-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Explore Careers</a
              >
            </li>
          </ul>
        </div>

        <!-- Website Section -->
        <div class="footer-section">
          <h2>Services</h2>
          <ul>
            <li>
              <a
                href="services-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Our Services</a
              >
            </li>
          </ul>
        </div>

        <!-- Get In Touch Section -->
        <div class="footer-section">
          <h2>Get In Touch</h2>
          <ul>
            <li><a href="contact-us-main.html">Contact Us</a></li>
            <li>
              <a
                href="https://www.google.com/maps/place/Guimaras+Specialist+Medical+Center,+Inc./@10.593169,122.601001,24954m/data=!3m1!1e3!4m6!3m5!1s0x33aeed18c8a73895:0xd9a9ea384be6a6fd!8m2!3d10.5931685!4d122.6010012!16s%2Fg%2F11sjg9pz5l?hl=fil&entry=ttu&g_ep=EgoyMDI1MDQxNi4xIKXMDSoASAFQAw%3D%3D"
                >Maps & Directions</a
              >
            </li>
            <li>
              <a
                href="career-main.html"
                target="_blank"
                rel="noopener noreferrer"
                >Jobs</a
              >
            </li>
          </ul>
        </div>

        <!-- Follow Us Section -->
        <div class="footer-section">
          <h2>Follow Us</h2>
          <!-- Social Media Icons: SVG Example -->
          <ul class="social-links">
            <li>
              <a href="#" title="Instagram" aria-label="Instagram">
                <i
                  class="fab fa-instagram"
                  style="font-size: 24px; color: #ccc"
                ></i>
              </a>
            </li>
            <li>
              <a
                href="https://www.facebook.com/gsmciguimaras"
                title="Facebook"
                aria-label="Facebook"
              >
                <i
                  class="fab fa-facebook"
                  style="font-size: 24px; color: #ccc"
                ></i>
              </a>
            </li>
            <li>
              <a href="#" title="YouTube" aria-label="YouTube">
                <i
                  class="fab fa-youtube"
                  style="font-size: 24px; color: #ccc"
                ></i>
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- Branding Section -->
      <div class="footer-branding">
        <a href="https://gsmci.com/" aria-label="GSMCI Website">
          <img
            src="https://github.com/ejlef/GSMCI-Pictures/blob/main/Logos/GSMCI%20Logo%20low.png?raw=true"
            alt="Guimaras Specialist Medical Center Inc."
          />
        </a>
        <h1>Guimaras Specialist Medical Center Inc.</h1>
        <p>© 2025 GSMCI-IT Website Developer</p>
      </div>
    </footer>
  </body>
</html>
