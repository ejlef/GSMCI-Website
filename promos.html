<style>
  /* General Styling */
  .img1 {
    max-height: 250px;
    padding: 1%;
    margin: 1%;
    border: solid 2px darkgreen;
    width: auto; /* Prevent stretching horizontally */
    height: auto; /* Prevent stretching vertically */
    max-width: 100%; /* Ensures it doesn't overflow horizontally */
  }

  .promos-pic {
    display: flex;
    flex-direction: row;
    justify-content: center;
    width: 100%;
    height: auto;
    margin-bottom: 3%;
    overflow-x: auto;
    scroll-behavior: smooth;
    white-space: nowrap;
  }

  .carousel-control-prev-icon,
  .carousel-control-next-icon {
    filter: invert(100%);
  }

  .carousel-dark .carousel-indicators [data-bs-target] {
    background-color: #ffffff !important;
  }

  .carousel {
    display: flex;
    width: 100%;
  }

  .carousel-img {
    padding: 5%;
    object-fit: contain; /* Maintains the aspect ratio of images */
    width: 100%; /* Makes images responsive but ensures aspect ratio */
    height: auto; /* Ensures the height adjusts proportionally */
    max-height: 60vh; /* Prevents the image from being too tall */
  }

  .carousel-inner {
    display: flex;
    height: auto;
    background-color: transparent;
  }

  .box-carousel {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-content: center;
    flex-wrap: wrap;
    border-radius: 5px;
  }

  .promos-img-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 5% 5% 5%;
  }

  .promos-box h1 {
    margin-bottom: 0%;
  }

  .promos-box {
    margin: 5%;
    text-align: center;
  }

  .promos-box h1 {
    color: darkgreen;
    font-family: "AppleGaramond-Bold";
  }

  /* Responsive Design */
  @media (max-width: 2561px) {
    .promos-box h1 {
      font-size: 5vw;
    }
    .carousel-img {
      height: 50vh;
    }
  }

  @media (max-width: 1024px) {
    .carousel-img {
      height: 40vh;
    }
  }

  @media (max-width: 769px) {
    .promos-box h1 {
      font-size: 8vw;
    }
    .carousel-img {
      height: 40vh; /* Adjusting height for smaller devices */
    }
  }

  @media (max-width: 426px) {
    .promos-pic {
      flex-direction: column; /* Stack the images vertically on very small screens */
      justify-content: center;
    }
    .img1 {
      max-height: 200px; /* Keeps images within a reasonable size */
    }
  }

  @media (max-width: 320px) {
    .img1 {
      max-height: 150px; /* Further reduces image size on extra small devices */
    }
    .promos-box h1 {
      font-size: 10vw; /* Adjusts the header size for very small devices */
    }
  }
</style>

<div class="promos-box">
  <h1>Promos</h1>
</div>

        <button

          <div class="carousel-caption d-none d-md-block">

            class="d-block w-100 carousel-img"

</div>
