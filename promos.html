<style>
  .promos-box {
    text-align: center;
    margin: 2rem auto;
  }

  .promos-box h1 {
    color: darkgreen;
    font-family: "AppleGaramond-Bold", serif;
    font-size: clamp(24px, 5vw, 48px);
  }

  /* Carousel Styles */
  .carousel {
    width: 100%;
    max-width: 1200px;
    margin: auto;
  }

  .carousel-img {
    display: block;
    max-height: 60vh;
    width: auto;
    max-width: 100%;
    height: auto;
    margin: auto;
    object-fit: contain;
    padding: 2%;
  }

  .carousel-control-prev-icon,
  .carousel-control-next-icon {
    filter: invert(100%);
  }

  .carousel-dark .carousel-indicators [data-bs-target] {
    background-color: #fff !important;
  }

  /* Promo Images Section */
  .promos-pic {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    padding: 2%;
    max-width: 1200px;
    margin: auto;
  }

  .img1 {
    border: 2px solid darkgreen;
    max-width: 100%;
    max-height: 250px;
    height: auto;
    width: auto;
    object-fit: contain;
  }

  /* Responsive Adjustments */
  @media (max-width: 1024px) {
    .carousel-img {
      max-height: 50vh;
    }
  }

  @media (max-width: 768px) {
    .carousel-img {
      max-height: 40vh;
    }
    .promos-box h1 {
      font-size: 7vw;
    }
  }

  @media (max-width: 425px) {
    .img1 {
      max-height: 180px;
    }
    .carousel-img {
      padding: 1%;
    }
    .promos-box h1 {
      font-size: 9vw;
    }
  }

  @media (max-width: 320px) {
    .img1 {
      max-height: 150px;
    }
    .promos-box h1 {
      font-size: 10vw;
    }
  }
</style>

<div class="promos-box">
  <h1>Promos</h1>
</div>

<div
  id="carouselExampleDark"
  class="carousel carousel-dark slide mb-4"
  data-bs-ride="carousel"
>
  <div class="carousel-indicators">
    <button
      type="button"
      data-bs-target="#carouselExampleDark"
      data-bs-slide-to="0"
      class="active"
      aria-current="true"
      aria-label="Slide 1"
    ></button>
    <button
      type="button"
      data-bs-target="#carouselExampleDark"
      data-bs-slide-to="1"
      aria-label="Slide 2"
    ></button>
    <button
      type="button"
      data-bs-target="#carouselExampleDark"
      data-bs-slide-to="2"
      aria-label="Slide 3"
    ></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active" data-bs-interval="5000">
      <img
        src="https://img.freepik.com/free-vector/background-empty-room-with-text-coming-soon_1017-5068.jpg?t=st=1743936841~exp=1743940441~hmac=828890328d3fc2787366413b96d1c4f5f519fefdb51823cac94a007098feaa05&w=900"
        class="carousel-img"
        alt="Coming Soon 1"
        loading="lazy"
      />
    </div>
    <div class="carousel-item" data-bs-interval="5000">
      <img
        src="https://img.freepik.com/free-vector/background-empty-room-with-text-coming-soon_1017-5068.jpg?t=st=1743936841~exp=1743940441~hmac=828890328d3fc2787366413b96d1c4f5f519fefdb51823cac94a007098feaa05&w=900"
        class="carousel-img"
        alt="Coming Soon 2"
        loading="lazy"
      />
    </div>
    <div class="carousel-item">
      <img
        src="https://img.freepik.com/free-vector/background-empty-room-with-text-coming-soon_1017-5068.jpg?t=st=1743936841~exp=1743940441~hmac=828890328d3fc2787366413b96d1c4f5f519fefdb51823cac94a007098feaa05&w=900"
        class="carousel-img"
        alt="Coming Soon 3"
        loading="lazy"
      />
    </div>
  </div>
  <button
    class="carousel-control-prev"
    type="button"
    data-bs-target="#carouselExampleDark"
    data-bs-slide="prev"
  >
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button
    class="carousel-control-next"
    type="button"
    data-bs-target="#carouselExampleDark"
    data-bs-slide="next"
  >
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<div class="promos-pic">
  <img
    src="GSMCI-Pictures/Promos/pheumonia.jpg"
    alt="Pneumonia"
    class="img1"
    loading="lazy"
  />
  <img
    src="GSMCI-Pictures/Promos/fathers day promo.jpg"
    alt="Father's Day Promo 2024"
    class="img1"
    loading="lazy"
  />
    <img
    src="GSMCI-Pictures/Promos/Dengue.jpg"
    alt="dengue"
    class="img1"
    loading="lazy"
  />
</div>
