<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
     <meta name="author" content="Felje Menor" />
    <meta
      name="copyright"
      content="Copyright © 2026 Guimaras Specialist Medical Center, Inc. All rights reserved."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Guimaras Specialist Medical Center, Inc.</title>
    <!-- Favicon -->
    <link
      href="GSMCI-Pictures/Logos/GSMCI Logo low.png"
      rel="icon"
      type="image/png"
    />
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        font-family: "Arial", sans-serif;
        background: #1a1a1a;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        text-align: center;
      }

      /* Pulsating emergency lights */
      .light-red,
      .light-blue {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 0;
        mix-blend-mode: overlay;
        opacity: 0;
        animation: pulse 2s infinite alternate;
      }
      .light-red {
        background: rgba(255, 0, 0, 0.2);
        animation-delay: 0s;
      }
      .light-blue {
        background: rgba(0, 0, 255, 0.2);
        animation-delay: 1s;
      }

      @keyframes pulse {
        0% {
          opacity: 0;
        }
        50% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
        }
      }

      /* Floating plus signs */
      .plus {
        position: absolute;
        color: #0ff;
        font-size: 20px;
        animation: floatPlus linear infinite;
        opacity: 0.5;
        z-index: 1;
      }

      @keyframes floatPlus {
        0% {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }

      /* Container */
      .container {
        position: relative;
        z-index: 2;
        text-align: center;
        animation: fadeIn 1.5s ease forwards;
        opacity: 0;
      }

      /* Hospital icon */
      .icon {
        font-size: 80px;
        color: #0ff;
        margin-bottom: 20px;
        animation: floatIcon 3s ease-in-out infinite alternate;
      }

      @keyframes floatIcon {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      h1 {
        font-size: 100px;
        color: #e74c3c;
        margin-bottom: 10px;
        animation: bounce 2s infinite;
      }

      h2 {
        font-size: 32px;
        margin-bottom: 15px;
        color: #fff;
      }

      p {
        font-size: 18px;
        color: #ccc;
        margin-bottom: 25px;
      }

      a {
        padding: 12px 25px;
        background-color: #0ff;
        color: #000;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        transition:
          transform 0.3s,
          background 0.3s,
          box-shadow 0.3s;
      }

      a:hover {
        background-color: #00bcd4;
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
      }

      /* Animations */
      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-20px);
        }
        60% {
          transform: translateY(-10px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Heartbeat SVG container */
      .heartbeat {
        width: 100%;
        max-width: 400px;
        height: 80px;
        margin: 20px auto;
        position: relative;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <!-- Emergency lights -->
    <div class="light-red"></div>
    <div class="light-blue"></div>

    <!-- Floating plus signs -->
    <div class="plus" style="top: 10%; left: 20%; animation-duration: 5s">
      +
    </div>
    <div class="plus" style="top: 80%; left: 70%; animation-duration: 7s">
      +
    </div>
    <div class="plus" style="top: 40%; left: 50%; animation-duration: 6s">
      +
    </div>
    <div class="plus" style="top: 60%; left: 30%; animation-duration: 8s">
      +
    </div>
    <div class="plus" style="top: 25%; left: 10%; animation-duration: 6s">
      +
    </div>
    <div class="plus" style="top: 70%; left: 85%; animation-duration: 9s">
      +
    </div>

    <div class="container">
      <div class="icon">&#127973;</div>
      <h1>404</h1>
      <h2>Page Not Found!</h2>
      <p>Oops! The page you are looking for doesn’t exist or has been moved.</p>

      <!-- Heartbeat line -->
      <div class="heartbeat">
        <svg
          width="100%"
          height="80"
          viewBox="0 0 400 80"
          xmlns="http://www.w3.org/2000/svg"
        >
          <polyline
            fill="none"
            stroke="#e74c3c"
            stroke-width="3"
            points="0,40 50,40 60,20 80,60 100,40 150,40 200,40 220,20 240,60 260,40 400,40"
          >
            <animate
              attributeName="points"
              dur="1.5s"
              repeatCount="indefinite"
              values="
              0,40 50,40 60,20 80,60 100,40 150,40 200,40 220,20 240,60 260,40 400,40;
              0,40 50,40 60,40 80,40 100,40 150,40 200,40 220,40 240,40 260,40 400,40;
              0,40 50,40 60,20 80,60 100,40 150,40 200,40 220,20 240,60 260,40 400,40
            "
            />
          </polyline>
        </svg>
      </div>

      <a href="index.html">Go Back to Home</a>
    </div>
  </body>
</html>
