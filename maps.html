<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maps & Directions</title>
    <!-- Favicon -->
    <link
      href="https://github.com/ejlef/GSMCI/blob/main/Logos/GSMCI%20Logo%20low.png?raw=true"
      rel="icon"
    />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f4f4f4;
        flex-direction: column;
      }
      .map-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
      }
      .fullscreen-btn,
      .back-btn {
        position: absolute;
        top: 10px;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 10px 20px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        z-index: 10;
      }
      .fullscreen-btn {
        right: 10px;
      }
      .back-btn {
        left: 10px;
      }
      .fullscreen-btn:hover,
      .back-btn:hover {
        background-color: rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">Back</button>

    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52871.568552810386!2d122.59710779104829!3d10.600353847561703!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33aeed18c8a73895%3A0xd9a9ea384be6a6fd!2sGuimaras%20Specialist%20Medical%20Center%2C%20Inc.!5e0!3m2!1sfil!2sph!4v1722930476671!5m2!1sfil!2sph"
        allowfullscreen=""
        class="lazyload blur-up"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
      <!-- Full-Screen Button -->
      <button class="fullscreen-btn" onclick="toggleFullscreen()">
        Go Full Screen
      </button>
    </div>

    <script>
      function toggleFullscreen() {
        const iframe = document.querySelector("iframe");
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.mozRequestFullScreen) {
          // Firefox
          iframe.mozRequestFullScreen();
        } else if (iframe.webkitRequestFullscreen) {
          // Chrome, Safari, and Opera
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {
          // IE/Edge
          iframe.msRequestFullscreen();
        }
      }

      function goBack() {
        window.history.back();
      }
    </script>
  </body>
</html>
